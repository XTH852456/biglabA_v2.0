[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
runner = [
    "qemu-system-riscv64",
    "-machine", "virt",
    "-nographic",
    "-bios", "none",
    "-global", "virtio-mmio.force-legacy=false",
    "-drive", "file=disk.img,if=none,format=raw,id=vd0",
    "-device", "virtio-blk-device,drive=vd0",
    "-kernel",
]
